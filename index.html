<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Controller</title>
</head>

<body>

<h3>RP2040 設定</h3>

<button onclick="connect()">USB接続</button> <button onclick="save()">SAVE</button>

<p id="status">未接続</p>

<hr>

<label>Threshold</label><br> <input type="range" id="threshold" min="0" max="65535" value="30000"> <span id="thresholdValue">30000</span>

<script>

let port;
let writer;
let reader;

const statusText = document.getElementById("status");
const threshold = document.getElementById("threshold");
const thresholdValue = document.getElementById("thresholdValue");

// ===== スライダー =====
threshold.oninput = () => {
    thresholdValue.textContent = threshold.value;
    sendLive();
};

// ===== USB接続 =====
async function connect() {

    port = await navigator.serial.requestPort();
    await port.open({ baudRate:115200 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    statusText.textContent = "接続OK";

    readLoop(); // ★受信開始
}

// ===== RP2040からの受信 =====
async function readLoop() {

    const decoder = new TextDecoder();

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const text = decoder.decode(value).trim();

        console.log("RP2040:", text);

        if (text === "SAVED") {
            statusText.textContent = "✅ 保存完了";
        }

        if (text.startsWith("ERROR")) {
            statusText.textContent = "❌ " + text;
        }
    }
}

// ===== リアルタイム送信 =====
async function sendLive() {

    if (!writer) return;

    const obj = {
        threshold: Number(threshold.value)
    };

    const txt = "SET " + JSON.stringify(obj) + "\n";

    await writer.write(new TextEncoder().encode(txt));
}

// ===== SAVE =====
async function save() {

    if (!writer) return;

    statusText.textContent = "保存中...";

    await writer.write(
        new TextEncoder().encode("SAVE\n")
    );
}

</script>

</body>
</html>
