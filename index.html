<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RP2040 Piezo Controller</title>

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}

h2{margin-bottom:10px;}

#status{
  font-size:18px;
  margin-bottom:15px;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  display:inline-block;
  margin-right:8px;
}

.red{background:#ff4040;}
.yellow{background:#ffd000;}
.green{background:#00ff88;}

button{
  font-size:16px;
  padding:10px 16px;
  margin-right:10px;
  cursor:pointer;
}

.card{
  border:1px solid #333;
  padding:18px;
  margin:14px 0;
  background:#151515;
}

.meterWrap{
  position:relative;
  width:100%;
  height:34px;
  background:#222;
  border-radius:6px;
  overflow:hidden;
}

.meterBar{
  position:absolute;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff88,#ffee00,#ff4040);
}

.peakBar{
  position:absolute;
  top:0;
  width:4px;
  height:100%;
  background:#ffffff;
}

.slider{
  width:100%;
}

label{
  font-size:14px;
}
</style>
</head>

<body>

<h2>RP2040 ピエゾ設定UI</h2>

<div id="status">
  <span id="led" class="dot red"></span>
  <span id="statText">DISCONNECTED</span>
</div>

<button id="connectBtn">接続</button>
<button id="saveBtn">SAVE</button>

<div id="channels"></div>

<script>
let port, reader, writer;
let lastReceive = 0;
const names=["D","F","J","K"];
let peaks=[0,0,0,0];

const led=document.getElementById("led");
const statText=document.getElementById("statText");
const channels=document.getElementById("channels");
const connectBtn=document.getElementById("connectBtn");
const saveBtn=document.getElementById("saveBtn");

function setStatus(text,color){
  statText.textContent=text;
  led.className="dot "+color;
}

/* ================= CONNECT ================= */
connectBtn.onclick = async () => {
  try{
    setStatus("CONNECTING...","yellow");
    port = await navigator.serial.requestPort();
    await port.open({baudRate:115200});
    writer = port.writable.getWriter();
    reader = port.readable.getReader();
    createUI();
    setStatus("CONNECTED","green");
    startRead();
    send({cmd:"get_settings"});
  }catch(e){
    console.error(e);
    setStatus("FAILED","red");
  }
};

/* ================= UI ================= */
function createUI(){
  channels.innerHTML="";
  for(let i=0;i<4;i++){
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${names[i]}</h3>
      <label>Gain</label>
      <input class="slider" type="range" min="0.5" max="5" step="0.1" value="1"
        oninput="sendParam(${i},this.value,'gain')">
      <br><br>
      <label>Threshold</label>
      <input class="slider" type="range" min="1000" max="40000" step="500" value="15000"
        oninput="sendParam(${i},this.value,'threshold')">
      <br><br>
      <div class="meterWrap">
        <div class="meterBar" id="bar${i}"></div>
        <div class="peakBar" id="peak${i}"></div>
      </div>
    `;
    channels.appendChild(div);
  }
}

/* ================= SEND ================= */
function send(obj){
  if(writer){
    writer.write(new TextEncoder().encode(JSON.stringify(obj)+"\n"));
  }
}

function sendParam(ch,val,type){
  send({cmd:"set", ch:ch, type:type, value:parseFloat(val)});
}

saveBtn.onclick = () => {
  setStatus("SAVING","yellow");
  send({cmd:"save"});
}

/* ================= METER ================= */
function updateMeter(ch,value){
  const percent=Math.min(100,(value/65535)*100);
  const bar=document.getElementById("bar"+ch);
  const peak=document.getElementById("peak"+ch);
  bar.style.width=percent+"%";
  if(value>peaks[ch]) peaks[ch]=value;
  const peakPercent=(peaks[ch]/65535)*100;
  peak.style.left=peakPercent+"%";
}

/* peak decay */
setInterval(()=>{
  for(let i=0;i<4;i++) peaks[i]*=0.92;
},40);

/* ================= READ ================= */
async function startRead(){
  const decoder=new TextDecoder();
  let buffer="";
  while(true){
    const {value,done}=await reader.read();
    if(done){setStatus("DISCONNECTED","red"); break;}
    lastReceive=Date.now();
    buffer+=decoder.decode(value);
    let lines=buffer.split("\n");
    buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith("{")) continue;
      try{
        const data=JSON.parse(line);
        if(data.type==="adc"){
          setStatus("RECEIVING DATA","green");
          updateMeter(data.ch,data.value);
        }
        if(data.type==="saved") setStatus("SAVED ✓","green");
        if(data.type==="save_error") setStatus("SAVE ERROR","red");
        if(data.type==="settings"){
          const sliders=document.querySelectorAll("input[type=range]");
          for(let i=0;i<4;i++){
            sliders[i*2].value=data.gain[i];
            sliders[i*2+1].value=data.threshold[i];
          }
          setStatus("SETTINGS LOADED","green");
        }
      }catch(e){}
    }
  }
}

/* ================= WATCHDOG ================= */
setInterval(()=>{
  if(Date.now()-lastReceive>1500) setStatus("NO DATA","red");
},500);

</script>
</body>
</html>
